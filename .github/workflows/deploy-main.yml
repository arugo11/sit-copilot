name: Deploy on main push

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  EXPECTED_AZURE_SUBSCRIPTION_ID: 4c170a0d-3e6d-42a0-b941-533e4f44e729

jobs:
  detect_changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.filter.outputs.backend }}
      frontend_changed: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - "app/**"
              - "pyproject.toml"
              - "uv.lock"
              - "Dockerfile"
            frontend:
              - "frontend/**"

  api_test:
    name: API test
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.backend_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Run pytest
        run: uv run pytest

  api_deploy:
    name: API deploy
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - api_test
    if: needs.detect_changes.outputs.backend_changed == 'true'
    permissions:
      contents: read
      id-token: write
    env:
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME }}
      ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      IMAGE_REPOSITORY: ${{ vars.AZURE_IMAGE_REPOSITORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Guard target subscription
        run: |
          test "${{ vars.AZURE_SUBSCRIPTION_ID }}" = "${EXPECTED_AZURE_SUBSCRIPTION_ID}" || {
            echo "AZURE_SUBSCRIPTION_ID must be ${EXPECTED_AZURE_SUBSCRIPTION_ID}";
            exit 1;
          }
          ACTIVE_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
          test "${ACTIVE_SUBSCRIPTION_ID}" = "${EXPECTED_AZURE_SUBSCRIPTION_ID}" || {
            echo "Active subscription mismatch: ${ACTIVE_SUBSCRIPTION_ID}";
            exit 1;
          }

      - name: Validate deploy variables
        run: |
          test -n "${RESOURCE_GROUP}" || { echo "AZURE_RESOURCE_GROUP is required."; exit 1; }
          test -n "${CONTAINER_APP_NAME}" || { echo "AZURE_CONTAINER_APP_NAME is required."; exit 1; }
          test -n "${ACR_NAME}" || { echo "AZURE_ACR_NAME is required."; exit 1; }
          test -n "${{ secrets.DEMO_SESSION_SECRET }}" || { echo "DEMO_SESSION_SECRET is required."; exit 1; }
          test -n "${{ secrets.DATABASE_URL }}" || { echo "DATABASE_URL is required."; exit 1; }
          test -n "${{ secrets.AZURE_SPEECH_KEY }}" || { echo "AZURE_SPEECH_KEY is required."; exit 1; }
          test -n "${{ secrets.AZURE_VISION_KEY }}" || { echo "AZURE_VISION_KEY is required."; exit 1; }
          test -n "${{ vars.AZURE_VISION_ENDPOINT }}" || { echo "AZURE_VISION_ENDPOINT is required."; exit 1; }
          test -n "${{ secrets.AZURE_SEARCH_API_KEY }}" || { echo "AZURE_SEARCH_API_KEY is required."; exit 1; }
          test -n "${{ vars.AZURE_SEARCH_ENDPOINT }}" || { echo "AZURE_SEARCH_ENDPOINT is required."; exit 1; }
          test -n "${{ vars.AZURE_OPENAI_ACCOUNT_NAME }}" || { echo "AZURE_OPENAI_ACCOUNT_NAME is required."; exit 1; }
          test -n "${{ secrets.AZURE_OPENAI_API_KEY }}" || { echo "AZURE_OPENAI_API_KEY is required."; exit 1; }
          test -n "${{ vars.AZURE_OPENAI_ENDPOINT }}" || { echo "AZURE_OPENAI_ENDPOINT is required."; exit 1; }
          test -n "${{ vars.AZURE_OPENAI_MODEL }}" || { echo "AZURE_OPENAI_MODEL is required."; exit 1; }
          if [ -z "${IMAGE_REPOSITORY}" ]; then
            echo "IMAGE_REPOSITORY not set; defaulting to sit-copilot-api"
            echo "IMAGE_REPOSITORY=sit-copilot-api" >> "${GITHUB_ENV}"
          fi

      - name: Log in to ACR
        run: |
          az acr login --name "${ACR_NAME}"

      - name: Build and push image to ACR
        id: build_image
        run: |
          IMAGE_REPOSITORY="${IMAGE_REPOSITORY:-sit-copilot-api}"
          IMAGE_TAG="${GITHUB_SHA}"
          IMAGE_URI="${ACR_NAME}.azurecr.io/${IMAGE_REPOSITORY}:${IMAGE_TAG}"

          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

          echo "image_uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

      - name: Update Container App
        run: |
          az containerapp update \
            --name "${CONTAINER_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --image "${{ steps.build_image.outputs.image_uri }}"

      - name: Enforce public demo runtime flags
        run: |
          az containerapp update \
            --name "${CONTAINER_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --set-env-vars \
              AZURE_SUBSCRIPTION_ID="${EXPECTED_AZURE_SUBSCRIPTION_ID}" \
              PUBLIC_DEMO_ENABLED=true \
              DEMO_SESSION_SECRET="${{ secrets.DEMO_SESSION_SECRET }}" \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              WEAVE_ENABLED=false \
              AZURE_OPENAI_ENABLED=true \
              AZURE_OPENAI_ACCOUNT_NAME="${{ vars.AZURE_OPENAI_ACCOUNT_NAME }}" \
              AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" \
              AZURE_OPENAI_ENDPOINT="${{ vars.AZURE_OPENAI_ENDPOINT }}" \
              AZURE_OPENAI_MODEL="${{ vars.AZURE_OPENAI_MODEL }}" \
              AZURE_SPEECH_KEY="${{ secrets.AZURE_SPEECH_KEY }}" \
              AZURE_SPEECH_REGION="${{ vars.AZURE_SPEECH_REGION }}" \
              AZURE_VISION_ENABLED=true \
              AZURE_VISION_KEY="${{ secrets.AZURE_VISION_KEY }}" \
              AZURE_VISION_ENDPOINT="${{ vars.AZURE_VISION_ENDPOINT }}" \
              AZURE_SEARCH_ENABLED=true \
              AZURE_SEARCH_API_KEY="${{ secrets.AZURE_SEARCH_API_KEY }}" \
              AZURE_SEARCH_ENDPOINT="${{ vars.AZURE_SEARCH_ENDPOINT }}" \
              LECTURE_LIVE_ASR_REVIEW_ENABLED=true \
              LECTURE_LIVE_TRANSLATION_ENABLED=true \
              LECTURE_LIVE_SUMMARY_ENABLED=true \
              LECTURE_LIVE_KEYTERMS_ENABLED=true \
              LECTURE_QA_ENABLED=true \
              LECTURE_IDLE_AUTOSTOP_SECONDS=120

      - name: Verify public demo runtime flags
        run: |
          ENV_DUMP="$(az containerapp show \
            --name "${CONTAINER_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --query 'properties.template.containers[0].env[].{name:name,value:value}' \
            -o tsv)"

          echo "${ENV_DUMP}" | grep -F "AZURE_SUBSCRIPTION_ID	${EXPECTED_AZURE_SUBSCRIPTION_ID}"
          echo "${ENV_DUMP}" | grep -F "PUBLIC_DEMO_ENABLED	true"
          echo "${ENV_DUMP}" | grep -F "WEAVE_ENABLED	false"
          echo "${ENV_DUMP}" | grep -F "AZURE_OPENAI_ENABLED	true"
          echo "${ENV_DUMP}" | grep -F "AZURE_SEARCH_ENABLED	true"
          echo "${ENV_DUMP}" | grep -F "AZURE_VISION_ENABLED	true"
          echo "${ENV_DUMP}" | grep -F "LECTURE_LIVE_ASR_REVIEW_ENABLED	true"
          echo "${ENV_DUMP}" | grep -F "LECTURE_LIVE_TRANSLATION_ENABLED	true"
          echo "${ENV_DUMP}" | grep -F "LECTURE_LIVE_SUMMARY_ENABLED	true"
          echo "${ENV_DUMP}" | grep -F "LECTURE_LIVE_KEYTERMS_ENABLED	true"
          echo "${ENV_DUMP}" | grep -F "LECTURE_QA_ENABLED	true"
          echo "${ENV_DUMP}" | grep -F "LECTURE_IDLE_AUTOSTOP_SECONDS	120"

  api_smoke:
    name: API smoke test
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - api_deploy
    if: needs.detect_changes.outputs.backend_changed == 'true'
    env:
      PROD_API_BASE_URL: ${{ vars.PROD_API_BASE_URL }}
    steps:
      - name: Verify health endpoint
        run: |
          curl --fail --show-error --silent \
            "${PROD_API_BASE_URL}/api/v4/health" \
            > health.json

          grep -q '"status"' health.json
          grep -q '"version"' health.json

      - name: Verify demo bootstrap endpoint
        run: |
          curl --fail --show-error --silent \
            -X POST \
            "${PROD_API_BASE_URL}/api/v4/auth/demo-session" \
            > demo-session.json

          grep -q '"lecture_token"' demo-session.json
          grep -q '"procedure_token"' demo-session.json

  frontend_build:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.frontend_changed == 'true'
    env:
      VITE_API_BASE_URL: ${{ vars.PROD_API_BASE_URL }}
      VITE_LECTURE_LIVE_TRANSLATION_ENABLED: "true"
      VITE_LECTURE_LIVE_SUMMARY_ENABLED: "true"
      VITE_LECTURE_LIVE_KEYTERMS_ENABLED: "true"
      VITE_LECTURE_QA_ENABLED: "true"
      VITE_LECTURE_IDLE_AUTOSTOP_SECONDS: "120"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Run frontend tests
        run: npm run test --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  frontend_deploy:
    name: Frontend deploy (SWA)
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - frontend_build
      - api_deploy
      - api_smoke
    if: |
      always() &&
      needs.detect_changes.outputs.frontend_changed == 'true' &&
      needs.frontend_build.result == 'success' &&
      (
        needs.detect_changes.outputs.backend_changed != 'true' ||
        (
          needs.api_deploy.result == 'success' &&
          needs.api_smoke.result == 'success'
        )
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Resolve app directory
        id: resolve_app_dir
        run: |
          APP_DIR="frontend/dist"
          if [ -f "${APP_DIR}/index.html" ]; then
            echo "app_dir=${APP_DIR}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ -f "${APP_DIR}/dist/index.html" ]; then
            echo "app_dir=${APP_DIR}/dist" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "index.html not found in downloaded artifact."
          find frontend -maxdepth 4 -type f | head -n 200
          exit 1

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ steps.resolve_app_dir.outputs.app_dir }}
          skip_app_build: true
          skip_api_build: true
