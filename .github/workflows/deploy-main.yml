name: Deploy suspended demo

on:
  workflow_dispatch:
    inputs:
      force_all:
        description: "Force frontend deploy regardless of changed paths"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-main-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect_changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.scope.outputs.frontend_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - "frontend/**"
              - ".github/workflows/deploy-main.yml"

      - name: Resolve deployment scope
        id: scope
        run: |
          frontend_changed="${{ steps.filter.outputs.frontend }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_all }}" = "true" ]; then
            frontend_changed="true"
          fi

          echo "frontend_changed=${frontend_changed}" >> "${GITHUB_OUTPUT}"

  frontend_build:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.frontend_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Run frontend tests
        run: npm run test --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  frontend_deploy:
    name: Frontend deploy (SWA)
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - frontend_build
    if: needs.detect_changes.outputs.frontend_changed == 'true' && needs.frontend_build.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Resolve app directory
        id: resolve_app_dir
        run: |
          APP_DIR="frontend/dist"
          if [ -f "${APP_DIR}/index.html" ]; then
            echo "app_dir=${APP_DIR}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ -f "${APP_DIR}/dist/index.html" ]; then
            echo "app_dir=${APP_DIR}/dist" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "index.html not found in downloaded artifact."
          find frontend -maxdepth 4 -type f | head -n 200
          exit 1

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ steps.resolve_app_dir.outputs.app_dir }}
          skip_app_build: true
          skip_api_build: true

  production_notice_smoke:
    name: Production notice smoke
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - frontend_deploy
    if: needs.detect_changes.outputs.frontend_changed == 'true' && needs.frontend_deploy.result == 'success'
    env:
      PROD_WEB_BASE_URL: ${{ vars.PROD_WEB_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate production web smoke configuration
        run: |
          test -n "${PROD_WEB_BASE_URL}" || { echo "PROD_WEB_BASE_URL is required."; exit 1; }

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Playwright Chromium
        run: npm exec --prefix frontend playwright install --with-deps chromium

      - name: Verify suspended notice at root
        run: |
          node <<'NODE'
          const { chromium } = require('./frontend/node_modules/playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            await page.goto(process.env.PROD_WEB_BASE_URL + '/', { waitUntil: 'networkidle' });
            const text = (await page.textContent('body')).replace(/\s+/g, ' ').trim();
            if (!text.includes('現在このデモは公開を停止しています. 何かあれば me@argo11.devまで')) {
              throw new Error(text);
            }
            await browser.close();
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Verify suspended notice on legacy route
        run: |
          node <<'NODE'
          const { chromium } = require('./frontend/node_modules/playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            await page.goto(process.env.PROD_WEB_BASE_URL + '/lectures', { waitUntil: 'networkidle' });
            const text = (await page.textContent('body')).replace(/\s+/g, ' ').trim();
            if (!text.includes('現在このデモは公開を停止しています. 何かあれば me@argo11.devまで')) {
              throw new Error(text);
            }
            await browser.close();
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
