name: PR CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend_lint:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Run ruff
        run: |
          uv run ruff check \
            app/api/v4/lecture_qa.py \
            app/services/lecture_index_service.py \
            app/services/lecture_retrieval_service.py \
            tests/api/v4/test_lecture_qa.py \
            tests/api/v4/test_lecture_e2e_azure_script.py

  backend_test:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: backend_lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Run pytest (exclude Azure E2E)
        run: uv run pytest -m "not azure_e2e"

  frontend_quality:
    name: Frontend lint/test/build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Run frontend lint (E2E scope)
        working-directory: frontend
        run: npx eslint e2e/prod-lecture-live-flow.spec.ts playwright.config.ts

      - name: Run frontend tests
        run: npm run test --prefix frontend

      - name: Run frontend typecheck/build
        run: npm run build --prefix frontend
